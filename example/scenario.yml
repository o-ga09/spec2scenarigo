title: MH-API
vars:
  endpoint: http://localhost:8080
steps:
- title: ヘルスチェックエンドポイント
  protocol: http
  request:
    method: GET
    url: '{{ vars.endpoint }}/v1/health'
    query:
      companId: xxxxx
      userId: 2222,2222
    header:
      x-api-key: '{{ env.API_KEY }}'
  expect:
    code: 200
    body:
      Message: ok
