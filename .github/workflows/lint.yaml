name: Lint and Test
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:

  golang-lint:
      name: golangci-lint
      runs-on: ubuntu-latest

      steps:
        - name: Check out code into the Go module directory
          uses: actions/checkout@v4

        - name: Set up Go
          uses: actions/setup-go@v5
          with:
            go-version: '1.26'

        - name: golangci-lint
          uses: golangci/golangci-lint-action@v7
          with:
            version: v2.10.1
            working-directory: .
            args: --timeout=5m --config=./.golangci.yaml ./...
